services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - kosmos-storage:/var/www/storage
      - ./app:/var/www/app:ro
      - ./bootstrap/providers:/var/www/bootstrap/providers:ro
      - ./config:/var/www/config:ro
      - ./database:/var/www/database:ro
      - ./lang:/var/www/lang:ro
      - ./resources:/var/www/resources:ro
      - ./routes:/var/www/routes:ro
    environment:
      APP_NAME: "Kosmos GPS"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://localhost:18080
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/storage/database.sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_ENCRYPTION: ""
      MAIL_FROM_ADDRESS: "noreply@kosmos-gps.test"
      MAIL_FROM_NAME: "Kosmos GPS"
    networks:
      - kosmos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:stable-alpine
    ports:
      - "${APP_PORT:-18080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - kosmos
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-11025}:1025"
      - "${MAILHOG_UI_PORT:-18025}:8025"
    networks:
      - kosmos
    restart: unless-stopped

volumes:
  kosmos-storage:

networks:
  kosmos:
    driver: bridge
